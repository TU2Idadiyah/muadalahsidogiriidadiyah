<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Tautan Profil</title>
    
    <!-- Tailwind CSS untuk Styling Cepat -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons untuk Ikon yang Elegan -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Konfigurasi Tema Tailwind Kustom -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.08)',
                        'glass-hover': 'rgba(255, 255, 255, 0.15)',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Gaya Kustom Tambahan */
        body {
            /* Background gradasi bergerak yang elegan */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }

        @keyframes gradient-xy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efek Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Kelas untuk animasi JS berurutan */
        .link-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out, background-color 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .link-item.show {
            opacity: 1;
            transform: translateY(0);
        }

        .link-item.show:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.1), 0 8px 10px -6px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-white font-sans antialiased flex items-center justify-center p-4 sm:p-8 selection:bg-indigo-500 selection:text-white">

    <!-- Efek Cahaya Latar Belakang Tambahan -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-float pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-float pointer-events-none" style="animation-delay: 2s;"></div>

    <!-- Container Utama (Kartu) -->
    <main class="glass-panel w-full max-w-md rounded-[2.5rem] p-8 sm:p-10 relative z-10 flex flex-col items-center">
        
        <!-- Bagian Profil -->
        <div class="relative mb-6 group cursor-pointer">
            <div class="w-28 h-28 rounded-full p-1 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 animate-gradient-x transition-transform duration-500 group-hover:scale-105 group-hover:rotate-3">
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e2e8f0" alt="Foto Profil" class="w-full h-full rounded-full object-cover border-4 border-[#1e1b4b]">
            </div>
            <!-- Badge Status -->
            <div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-4 border-[#1e1b4b] rounded-full"></div>
        </div>

        <!-- Nama dan Bio -->
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 mb-1 tracking-tight text-center">Budi Santoso</h1>
        <p class="text-gray-400 text-sm mb-8 text-center flex items-center gap-1">
            <i class="ph ph-code text-indigo-400"></i>
            Fullstack Web Developer
        </p>

        <!-- Daftar Tautan -->
        <div class="w-full flex flex-col gap-4" id="links-container">
            
            <!-- Tautan 1 -->
            <a href="#" class="link-item group relative w-full flex items-center justify-between p-4 rounded-2xl bg-glass border border-white/5 hover:bg-glass-hover hover:border-white/20">
                <div class="flex items-center gap-4 relative z-10">
                    <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center text-xl group-hover:bg-indigo-500 group-hover:text-white transition-colors duration-300">
                        <i class="ph ph-globe-hemisphere-west"></i>
                    </div>
                    <span class="font-medium text-gray-200 group-hover:text-white transition-colors">Portofolio Pribadi</span>
                </div>
                <i class="ph ph-arrow-up-right text-gray-500 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Tautan 2 -->
            <a href="#" class="link-item group relative w-full flex items-center justify-between p-4 rounded-2xl bg-glass border border-white/5 hover:bg-glass-hover hover:border-white/20">
                <div class="flex items-center gap-4 relative z-10">
                    <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center text-xl group-hover:bg-gray-800 group-hover:text-white transition-colors duration-300">
                        <i class="ph ph-github-logo"></i>
                    </div>
                    <span class="font-medium text-gray-200 group-hover:text-white transition-colors">Github</span>
                </div>
                <i class="ph ph-arrow-up-right text-gray-500 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Tautan 3 -->
            <a href="#" class="link-item group relative w-full flex items-center justify-between p-4 rounded-2xl bg-glass border border-white/5 hover:bg-glass-hover hover:border-white/20">
                <div class="flex items-center gap-4 relative z-10">
                    <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300">
                        <i class="ph ph-linkedin-logo"></i>
                    </div>
                    <span class="font-medium text-gray-200 group-hover:text-white transition-colors">LinkedIn</span>
                </div>
                <i class="ph ph-arrow-up-right text-gray-500 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Tautan 4 -->
            <a href="#" class="link-item group relative w-full flex items-center justify-between p-4 rounded-2xl bg-glass border border-white/5 hover:bg-glass-hover hover:border-white/20">
                <div class="flex items-center gap-4 relative z-10">
                    <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center text-xl group-hover:bg-pink-600 group-hover:text-white transition-colors duration-300">
                        <i class="ph ph-instagram-logo"></i>
                    </div>
                    <span class="font-medium text-gray-200 group-hover:text-white transition-colors">Instagram</span>
                </div>
                <i class="ph ph-arrow-up-right text-gray-500 group-hover:text-white transition-colors"></i>
            </a>

            <!-- Tautan 5 (Tautan Utama/CTA) -->
            <a href="#" class="link-item group relative w-full flex items-center justify-center p-4 mt-2 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 border border-transparent hover:from-indigo-500 hover:to-purple-500 text-white font-semibold shadow-lg shadow-indigo-500/25">
                <span class="flex items-center gap-2 relative z-10">
                    <i class="ph ph-paper-plane-tilt"></i>
                    Hubungi Saya
                </span>
            </a>

        </div>

        <!-- Sosial Media Ikon Kecil di Bawah -->
        <div class="mt-8 flex items-center gap-6 text-gray-400">
            <a href="#" class="hover:text-white hover:-translate-y-1 transition-all duration-300 text-2xl"><i class="ph ph-twitter-logo"></i></a>
            <a href="#" class="hover:text-white hover:-translate-y-1 transition-all duration-300 text-2xl"><i class="ph ph-youtube-logo"></i></a>
            <a href="#" class="hover:text-white hover:-translate-y-1 transition-all duration-300 text-2xl"><i class="ph ph-envelope-simple"></i></a>
        </div>
        
    </main>

    <!-- JavaScript untuk Animasi Interaktif -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('.link-item');
            
            // Animasi masuk (staggered fade in) untuk setiap tautan
            links.forEach((link, index) => {
                setTimeout(() => {
                    link.classList.add('show');
                }, 150 * (index + 1)); // jeda 150ms tiap tombol
            });
        });
    </script>
</body>
</html>
